services:
  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-websocket-redis}
    command: redis-server --save ""
    restart: unless-stopped
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${WEBSOCKET_CONTAINER_NAME:-websocket-app}
    restart: unless-stopped
    ports:
      - "${WEBSOCKET_PORT:-7420}:${WEBSOCKET_INTERNAL_PORT:-7419}"
    environment:
      - WEBSOCKET_REDIS_HOST=${WEBSOCKET_REDIS_HOST:-redis}
      - WEBSOCKET_REDIS_PORT=${WEBSOCKET_REDIS_PORT:-6379}
      - DEBUG=${DEBUG:-False}
    depends_on:
      - redis
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    name: ${DOCKER_NETWORK_NAME:-websocket-network}
    driver: bridge
